<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Unit Converter - Free Online Tool</title>
    <meta name="description" content="Convert between units of length, weight, temperature, speed, data, time, and more.">
    <meta name="keywords" content="free unit converter online">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="/unit-converter/">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #252833;
            --text: #e4e4e7;
            --text-muted: #9ca3af;
            --border: #2d3040;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; width: 100%; }
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 0; }
        header h1 { font-size: 1.8em; text-align: center; }
        header h1 span { color: var(--primary); }
        header p { text-align: center; color: var(--text-muted); margin-top: 8px; font-size: 1.05em; }
        main { flex: 1; padding: 30px 0; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .card h2 { color: var(--primary); margin-bottom: 16px; font-size: 1.2em; }
        textarea, input[type="text"], input[type="number"], input[type="url"], select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 120px; font-family: 'Consolas', 'Monaco', monospace; }
        button, .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: scale(0.97); }
        .btn-secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .output-area {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            min-height: 100px;
            margin-top: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .stat {
            background: var(--surface2);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat .value { font-size: 1.8em; font-weight: bold; color: var(--primary); }
        .stat .label { font-size: 0.85em; color: var(--text-muted); margin-top: 4px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85em;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--primary); text-decoration: none; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.95em; }
        .form-group { margin-bottom: 16px; }
        .range-container { display: flex; align-items: center; gap: 12px; }
        .range-container input[type="range"] { flex: 1; }
        .range-value { min-width: 50px; text-align: center; font-weight: bold; color: var(--primary); }
        .color-preview { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
        
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><span>Universal</span> Unit Converter</h1>
            <p>Convert between units of length, weight, temperature, speed, data, time, and more.</p>
        </div>
    </header>
    <main>
        <div class="container">
            
            <div class="card">
                <h2>🔄 Unit Converter</h2>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" onchange="loadUnits()">
                        <option value="length">📏 Length</option>
                        <option value="weight">⚖️ Weight</option>
                        <option value="temperature">🌡️ Temperature</option>
                        <option value="speed">🏎️ Speed</option>
                        <option value="data">💾 Data Storage</option>
                        <option value="time">⏱️ Time</option>
                        <option value="area">📐 Area</option>
                        <option value="volume">🧪 Volume</option>
                    </select>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>From</label>
                        <input type="number" id="fromVal" value="1" oninput="convert()">
                        <select id="fromUnit" onchange="convert()" style="margin-top:8px;"></select>
                    </div>
                    <div class="form-group">
                        <label>To</label>
                        <input type="number" id="toVal" readonly style="font-weight:bold;color:var(--primary);font-size:18px;">
                        <select id="toUnit" onchange="convert()" style="margin-top:8px;"></select>
                    </div>
                </div>
                <div class="btn-group" style="justify-content:center;">
                    <button onclick="swapUnits()">🔃 Swap</button>
                    <button onclick="copyResult()" class="btn-secondary">📋 Copy</button>
                </div>
            </div>
            <div class="card">
                <h2>📊 All Conversions</h2>
                <div id="allConversions" class="output-area" style="font-family:sans-serif;"></div>
            </div>
        
        </div>
    </main>
    <footer>
        <div class="container">
            <p>Free tool by <a href="/">AutoHustle Tools</a> | No sign-up required | 100% client-side</p>
        </div>
    </footer>
    <script>
    
        const UNITS = {
            length: {meter:1, kilometer:1000, centimeter:0.01, millimeter:0.001, mile:1609.344, yard:0.9144, foot:0.3048, inch:0.0254, nautical_mile:1852},
            weight: {kilogram:1, gram:0.001, milligram:0.000001, pound:0.453592, ounce:0.0283495, ton:1000, stone:6.35029},
            speed: {mps:1, kph:0.277778, mph:0.44704, knot:0.514444, fps:0.3048},
            data: {byte:1, kilobyte:1024, megabyte:1048576, gigabyte:1073741824, terabyte:1099511627776, petabyte:1125899906842624, bit:0.125},
            time: {second:1, minute:60, hour:3600, day:86400, week:604800, month:2592000, year:31536000, millisecond:0.001},
            area: {sqm:1, sqkm:1e6, sqft:0.092903, sqyd:0.836127, acre:4046.86, hectare:10000, sqmi:2589988},
            volume: {liter:1, milliliter:0.001, gallon_us:3.78541, quart:0.946353, cup:0.236588, fl_oz:0.0295735, cubic_m:1000, cubic_ft:28.3168}
        };
        const TEMP_FUNCS = {
            celsius_to_fahrenheit: c => c*9/5+32, fahrenheit_to_celsius: f => (f-32)*5/9,
            celsius_to_kelvin: c => c+273.15, kelvin_to_celsius: k => k-273.15,
            fahrenheit_to_kelvin: f => (f-32)*5/9+273.15, kelvin_to_fahrenheit: k => (k-273.15)*9/5+32,
        };

        function loadUnits() {
            const cat = document.getElementById('category').value;
            const fromSel = document.getElementById('fromUnit');
            const toSel = document.getElementById('toUnit');
            const units = cat === 'temperature' ? ['celsius','fahrenheit','kelvin'] : Object.keys(UNITS[cat]);
            fromSel.innerHTML = units.map((u,i) => `<option value="${u}" ${i===0?'selected':''}>${u.replace(/_/g,' ')}</option>`).join('');
            toSel.innerHTML = units.map((u,i) => `<option value="${u}" ${i===1?'selected':''}>${u.replace(/_/g,' ')}</option>`).join('');
            convert();
        }

        function convert() {
            const cat = document.getElementById('category').value;
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;
            const val = parseFloat(document.getElementById('fromVal').value) || 0;
            let result;
            if (cat === 'temperature') {
                if (from === to) result = val;
                else {
                    const fn = TEMP_FUNCS[from+'_to_'+to];
                    result = fn ? fn(val) : val;
                }
            } else {
                const base = val * UNITS[cat][from];
                result = base / UNITS[cat][to];
            }
            document.getElementById('toVal').value = result < 0.001 ? result.toExponential(4) : parseFloat(result.toPrecision(8));
            // All conversions
            const units = cat === 'temperature' ? ['celsius','fahrenheit','kelvin'] : Object.keys(UNITS[cat]);
            const all = units.map(u => {
                let r;
                if (cat === 'temperature') {
                    if (from === u) r = val;
                    else { const fn = TEMP_FUNCS[from+'_to_'+u]; r = fn ? fn(val) : val; }
                } else {
                    r = (val * UNITS[cat][from]) / UNITS[cat][u];
                }
                const display = r < 0.001 ? r.toExponential(4) : parseFloat(r.toPrecision(8));
                return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>${u.replace(/_/g,' ')}</span><strong style="color:var(--primary)">${display}</strong></div>`;
            });
            document.getElementById('allConversions').innerHTML = all.join('');
        }

        function swapUnits() {
            const f = document.getElementById('fromUnit');
            const t = document.getElementById('toUnit');
            [f.value, t.value] = [t.value, f.value];
            convert();
        }
        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('toVal').value);
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = 'Copied!';
            document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
        }
        loadUnits();
        
    </script>
<div style="position:fixed;bottom:0;left:0;right:0;background:#13151d;border-top:2px solid #6366f1;padding:10px 20px;text-align:center;z-index:9999;">

</div>
</body>
</html>
