<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - Free Online Tool</title>
    <meta name="description" content="Generate placeholder text in paragraphs, sentences, or words. Includes plain and HTML output.">
    <meta name="keywords" content="free lorem ipsum generator">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="/lorem-ipsum/">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #14b8a6;
            --primary-dark: #0d9488;
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #252833;
            --text: #e4e4e7;
            --text-muted: #9ca3af;
            --border: #2d3040;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; width: 100%; }
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 0; }
        header h1 { font-size: 1.8em; text-align: center; }
        header h1 span { color: var(--primary); }
        header p { text-align: center; color: var(--text-muted); margin-top: 8px; font-size: 1.05em; }
        main { flex: 1; padding: 30px 0; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .card h2 { color: var(--primary); margin-bottom: 16px; font-size: 1.2em; }
        textarea, input[type="text"], input[type="number"], input[type="url"], select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 120px; font-family: 'Consolas', 'Monaco', monospace; }
        button, .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: scale(0.97); }
        .btn-secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .output-area {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            min-height: 100px;
            margin-top: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .stat {
            background: var(--surface2);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat .value { font-size: 1.8em; font-weight: bold; color: var(--primary); }
        .stat .label { font-size: 0.85em; color: var(--text-muted); margin-top: 4px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85em;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--primary); text-decoration: none; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.95em; }
        .form-group { margin-bottom: 16px; }
        .range-container { display: flex; align-items: center; gap: 12px; }
        .range-container input[type="range"] { flex: 1; }
        .range-value { min-width: 50px; text-align: center; font-weight: bold; color: var(--primary); }
        .color-preview { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
        
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><span>Lorem</span> Ipsum Generator</h1>
            <p>Generate placeholder text in paragraphs, sentences, or words. Includes plain and HTML output.</p>
        </div>
    </header>
    <main>
        <div class="container">
            
            <div class="card">
                <h2>⚙️ Options</h2>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type" onchange="gen()">
                            <option value="paragraphs">Paragraphs</option>
                            <option value="sentences">Sentences</option>
                            <option value="words">Words</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Count: <strong id="countVal">3</strong></label>
                        <input type="range" id="count" min="1" max="20" value="3" oninput="document.getElementById('countVal').textContent=this.value;gen()">
                    </div>
                </div>
                <div style="margin-top:8px;">
                    <label><input type="checkbox" id="startLorem" checked onchange="gen()"> Start with "Lorem ipsum..."</label>
                </div>
                <div class="btn-group">
                    <button onclick="gen()">🔄 Generate</button>
                    <button onclick="copyText()" class="btn-secondary">📋 Copy Text</button>
                    <button onclick="copyHTML()" class="btn-secondary">📋 Copy HTML</button>
                </div>
            </div>
            <div class="card">
                <h2>📄 Output</h2>
                <div id="output" class="output-area" style="font-family:sans-serif;line-height:1.8;min-height:120px;white-space:normal;"></div>
                <div class="stats" style="margin-top:16px;">
                    <div class="stat"><div class="value" id="wc">0</div><div class="label">Words</div></div>
                    <div class="stat"><div class="value" id="cc">0</div><div class="label">Characters</div></div>
                    <div class="stat"><div class="value" id="pc">0</div><div class="label">Paragraphs</div></div>
                </div>
            </div>
        
        </div>
    </main>
    <footer>
        <div class="container">
            <p>Free tool by <a href="/">AutoHustle Tools</a> | No sign-up required | 100% client-side</p>
        </div>
    </footer>
    <script>
    
        const WORDS = 'lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum perspiciatis unde omnis iste natus error voluptatem accusantium doloremque laudantium totam rem aperiam eaque ipsa quae ab illo inventore veritatis quasi architecto beatae vitae dicta explicabo nemo ipsam quia voluptas aspernatur aut odit fugit consequuntur magni dolores eos ratione sequi nesciunt neque porro quisquam dolorem adipisci numquam corporis suscipit laboriosam nisi aliquid commodi consequatur quis autem vel eum iure quam nihil molestiae illum quo minus maxime placeat facere possimus omnis assumenda repudiandae temporibus quibusdam officiis debitis rerum necessitatibus saepe eveniet voluptates repudiandae recusandae'.split(' ');
        const FIRST = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';

        function randWord() { return WORDS[Math.floor(Math.random()*WORDS.length)]; }
        function randSentence(minW, maxW) {
            const len = minW + Math.floor(Math.random()*(maxW-minW));
            const words = Array.from({length:len}, randWord);
            words[0] = words[0][0].toUpperCase() + words[0].slice(1);
            return words.join(' ') + '.';
        }
        function randParagraph(minS, maxS) {
            const len = minS + Math.floor(Math.random()*(maxS-minS));
            return Array.from({length:len}, () => randSentence(8,18)).join(' ');
        }

        function gen() {
            const type = document.getElementById('type').value;
            const count = parseInt(document.getElementById('count').value);
            const startLorem = document.getElementById('startLorem').checked;
            let text = '';
            if (type === 'paragraphs') {
                const paras = Array.from({length:count}, () => randParagraph(3,6));
                if (startLorem) paras[0] = FIRST + ' ' + paras[0];
                text = paras.join('\n\n');
            } else if (type === 'sentences') {
                const sents = Array.from({length:count}, () => randSentence(8,18));
                if (startLorem) sents[0] = FIRST;
                text = sents.join(' ');
            } else {
                const words = Array.from({length:count}, randWord);
                if (startLorem) words.splice(0, Math.min(2,words.length), 'lorem', 'ipsum');
                text = words.join(' ');
            }
            document.getElementById('output').textContent = text;
            document.getElementById('wc').textContent = text.split(/\s+/).filter(Boolean).length;
            document.getElementById('cc').textContent = text.length;
            document.getElementById('pc').textContent = text.split(/\n\n/).filter(Boolean).length;
        }
        function copyText() {
            navigator.clipboard.writeText(document.getElementById('output').textContent);
            toast('Copied!');
        }
        function copyHTML() {
            const text = document.getElementById('output').textContent;
            const html = text.split('\n\n').map(p => '<p>'+p+'</p>').join('\n');
            navigator.clipboard.writeText(html);
            toast('HTML copied!');
        }
        function toast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
        }
        gen();
        
    </script>
<div style="position:fixed;bottom:0;left:0;right:0;background:#13151d;border-top:2px solid #6366f1;padding:10px 20px;text-align:center;z-index:9999;">

</div>

</html>
